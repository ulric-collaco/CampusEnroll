<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Enroll | Student Enrollment System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="page-shell">
        <section class="form-card">
            <h1>Campus Enroll</h1>
            <p class="subtitle">SCHOOL-DB / STUDENT-TABLE</p>

            <form id="studentForm" novalidate>
                <div class="field-grid">
                    <label for="rollNo">Roll-No (Primary Key)</label>
                    <input id="rollNo" name="rollNo" type="text" placeholder="Enter Roll-No">

                    <label for="fullName">Full-Name</label>
                    <input id="fullName" name="fullName" type="text" placeholder="Enter full name">

                    <label for="studentClass">Class</label>
                    <input id="studentClass" name="studentClass" type="text" placeholder="Enter class">

                    <label for="birthDate">Birth-Date</label>
                    <input id="birthDate" name="birthDate" type="date">

                    <label for="address">Address</label>
                    <textarea id="address" name="address" rows="3" placeholder="Enter address"></textarea>

                    <label for="enrollmentDate">Enrollment-Date</label>
                    <input id="enrollmentDate" name="enrollmentDate" type="date">
                </div>

                <p id="statusMsg" class="status" aria-live="polite"></p>

                <div class="button-row">
                    <button id="saveBtn" type="button">Save</button>
                    <button id="updateBtn" type="button">Update</button>
                    <button id="resetBtn" type="button" class="secondary">Reset</button>
                </div>
            </form>
        </section>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://login2explore.com/jpdb/resources/js/0.0.3/jpdb-commons.js"></script>
    <script src="script.js"></script>
</body>
</html>
